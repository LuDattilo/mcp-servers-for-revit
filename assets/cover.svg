<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#e8956f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid lines (Revit feel) -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Left icon group: Revit building -->
  <g transform="translate(80, 70)">
    <!-- Building outline -->
    <rect x="0" y="40" width="80" height="120" rx="2" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.8"/>
    <rect x="90" y="20" width="60" height="140" rx="2" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6"/>
    <rect x="30" y="80" width="20" height="20" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <rect x="30" y="110" width="20" height="20" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <rect x="100" y="50" width="18" height="18" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <rect x="100" y="80" width="18" height="18" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <rect x="100" y="110" width="18" height="18" rx="1" fill="#4FC3F7" opacity="0.3"/>
    <!-- Antenna -->
    <line x1="120" y1="20" x2="120" y2="0" stroke="#4FC3F7" stroke-width="2" opacity="0.6"/>
    <circle cx="120" cy="0" r="3" fill="#4FC3F7" opacity="0.8"/>
  </g>

  <!-- Arrow / connection -->
  <g transform="translate(280, 140)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#accent)" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
    <polygon points="60,-6 72,0 60,6" fill="#D97757" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="380" y="115" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    mcp-servers-for-revit
  </text>

  <!-- Subtitle -->
  <text x="380" y="148" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#a0aec0">
    Connect AI assistants to Autodesk Revit via MCP
  </text>

  <!-- Badges row -->
  <g transform="translate(380, 170)">
    <!-- 80+ tools -->
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#D97757" opacity="0.9"/>
    <text x="45" y="17" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">80+ Tools</text>

    <!-- Revit versions -->
    <rect x="100" y="0" width="110" height="26" rx="13" fill="#4FC3F7" opacity="0.25"/>
    <text x="155" y="17" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#4FC3F7" text-anchor="middle">Revit 2023-2026</text>

    <!-- MIT -->
    <rect x="220" y="0" width="58" height="26" rx="13" fill="#48BB78" opacity="0.25"/>
    <text x="249" y="17" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#48BB78" text-anchor="middle">MIT</text>

    <!-- MCP -->
    <rect x="288" y="0" width="54" height="26" rx="13" fill="#fff" opacity="0.1"/>
    <text x="315" y="17" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#a0aec0" text-anchor="middle">MCP</text>
  </g>

  <!-- Claude icon (bottom right) -->
  <g transform="translate(810, 230)">
    <circle cx="0" cy="0" r="22" fill="#D97757" opacity="0.15"/>
    <text x="0" y="7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#D97757" text-anchor="middle">C</text>
  </g>
</svg>
